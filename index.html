<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 장소 검색 서비스</title>
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        /* 화면을 왼쪽과 오른쪽으로 2분할하는 컨테이너 */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 사이드바 (검색창 + 결과 리스트) */
        .sidebar {
            width: 350px;
            height: 100%;
            background-color: #f7f7f7;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        /* 검색창 영역 */
        .search-box {
            padding: 15px;
            background-color: #fff;
            border-bottom: 1px solid #eee;
        }
        .search-box h2 {
            font-size: 18px;
            margin-bottom: 10px;
        }
        .search-form {
            display: flex;
            gap: 5px;
        }
        .search-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .search-btn {
            padding: 8px 15px;
            background-color: #fee500; /* 카카오 시그니처 옐로우 */
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .search-btn:hover {
            background-color: #fada0a;
        }

        /* 검색 결과 리스트 영역 (스크롤 가능) */
        .places-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .place-item {
            padding: 10px;
            border-bottom: 1px solid #e1e1e1;
            background-color: #fff;
            margin-bottom: 8px;
            border-radius: 4px;
            cursor: pointer;
        }
        .place-item:hover {
            background-color: #f0f0f0;
        }
        .place-item h5 {
            font-size: 15px;
            color: #333;
            margin-bottom: 5px;
        }
        .place-item .address {
            font-size: 12px;
            color: #666;
        }

        /* 오른쪽 지도 영역 */
        .map-area {
            flex: 1;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <div class="search-box">
                <h2>어디로 갈까요?</h2>
                <form class="search-form" onsubmit="searchPlaces(); return false;">
                    <input type="text" id="keyword" class="search-input" placeholder="장소를 입력하세요" value="강남역">
                    <button type="submit" class="search-btn">검색</button>
                </form>
            </div>
            <div id="placesList" class="places-list"></div>
        </div>

        <div id="map" class="map-area"></div>
    </div>

    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=1532352a93d383138c1e5486388309cf&libraries=services"></script>

    <script>
        // 전역 변수 설정
        let map;
        let ps;
        let infowindow;
        let markers = [];

        // 1. 지도가 제대로 로드된 후 실행되도록 kakao.maps.load 사용
        kakao.maps.load(function() {
            const mapContainer = document.getElementById('map'); 
            const mapOption = {
                center: new kakao.maps.LatLng(37.566826, 126.9786567), // 기본 위치 (서울시청)
                level: 5 // 지도 확대 레벨: 5
            };

            // 지도 생성
            map = new kakao.maps.Map(mapContainer, mapOption);
            
            // 장소 검색 객체 및 인포윈도우 생성
            ps = new kakao.maps.services.Places();  
            infowindow = new kakao.maps.InfoWindow({zIndex:1});

            // 2. 현재 위치 권한 요청 및 지도 중심 이동
            getUserLocation();
        });

        // 사용자의 현재 위치를 가져오는 함수
        function getUserLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;  // 위도
                    const lon = position.coords.longitude; // 경도
                    
                    const locPosition = new kakao.maps.LatLng(lat, lon);
                    
                    // 지도 중심을 현재 위치로 이동
                    map.setCenter(locPosition);
                    
                    // 현재 위치에 마커 표시
                    displayCurrentLocationMarker(locPosition);
                }, function(error) {
                    console.log("위치 권한을 획득하지 못했습니다.", error);
                });
            }
        }

        // 현재 위치 마커 표시
        function displayCurrentLocationMarker(locPosition) {
            const marker = new kakao.maps.Marker({  
                map: map, 
                position: locPosition
            }); 
            
            const message = '<div style="padding:5px; font-size:12px;">현재 내 위치</div>';
            infowindow.setContent(message);
            infowindow.open(map, marker);
        }

        // 3. 키워드 검색 완료 시 호출되는 함수
        function searchPlaces() {
            const keyword = document.getElementById('keyword').value;

            if (!keyword.replace(/^\s+|\s+$/g, '')) {
                alert('키워드를 입력해주세요!');
                return false;
            }

            // 카카오 장소 검색 서비스 이용
            ps.keywordSearch(keyword, placesSearchCB); 
        }

        // 장소검색이 완료됐을 때 호출되는 콜백함수
        function placesSearchCB(data, status, pagination) {
            if (status === kakao.maps.services.Status.OK) {
                // 정상적으로 검색이 완료됐으면 검색 목록과 마커를 표출합니다
                displayPlaces(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                alert('검색 결과가 존재하지 않습니다.');
                return;
            } else if (status === kakao.maps.services.Status.ERROR) {
                alert('검색 결과 중 오류가 발생했습니다.');
                return;
            }
        }

        // 검색 결과 목록과 마커를 표출하는 함수
        function displayPlaces(places) {
            const listEl = document.getElementById('placesList');
            const bounds = new kakao.maps.LatLngBounds();
            
            // 기존 마커 및 목록 제거
            removeMarkers();
            listEl.innerHTML = '';

            for (let i = 0; i < places.length; i++) {
                const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                const marker = addMarker(placePosition);
                const itemEl = getListItem(i, places[i]); // 검색 결과 항목 Element 생성

                // 검색된 장소 위치를 기준으로 지도 범위를 재설정하기위해 LatLngBounds 객체에 좌표를 추가
                bounds.extend(placePosition);

                // 마커와 검색결과 항목에 mouseover 이벤트를 등록합니다
                // 마커에 마우스 오버하면 장소명이 인포윈도우에 표출됩니다
                (function(marker, title) {
                    kakao.maps.event.addListener(marker, 'mouseover', function() {
                        displayInfowindow(marker, title);
                    });

                    kakao.maps.event.addListener(marker, 'mouseout', function() {
                        infowindow.close();
                    });

                    itemEl.onmouseover =  function () {
                        displayInfowindow(marker, title);
                    };

                    itemEl.onmouseout =  function () {
                        infowindow.close();
                    };
                    
                    // 클릭하면 해당 위치로 지도 중심 이동
                    itemEl.onclick = function() {
                        map.panTo(marker.getPosition());
                    };
                })(marker, places[i].place_name);

                listEl.appendChild(itemEl);
            }

            // 검색된 장소 위치를 기준으로 지도 범위를 재설정
            map.setBounds(bounds);
        }

        // 검색결과 항목을 HTML DOM으로 반환하는 함수
        function getListItem(index, places) {
            const el = document.createElement('div');
            el.className = 'place-item';
            
            let itemStr = `<h5>${places.place_name}</h5>`;
            if (places.road_address_name) {
                itemStr += `<span class="address">${places.road_address_name}</span>`;
            } else {
                itemStr += `<span class="address">${places.address_name}</span>`;
            }

            el.innerHTML = itemStr;
            return el;
        }

        // 마커를 생성하고 지도 위에 마커를 표시하는 함수
        function addMarker(position) {
            const marker = new kakao.maps.Marker({
                position: position,
                map: map
            });
            markers.push(marker);
            return marker;
        }

        // 지도 위에 표시되고 있는 마커를 모두 제거하는 함수
        function removeMarkers() {
            for (let i = 0; i < markers.length; i++) {
                markers[i].setMap(null);
            }            
            markers = [];
        }

        // 검색결과 위 인포윈도우를 표시하는 함수
        function displayInfowindow(marker, title) {
            const content = `<div style="padding:5px;z-index:1;font-size:12px;text-align:center;">${title}</div>`;
            infowindow.setContent(content);
            infowindow.open(map, marker);
        }
    </script>
</body>
</html>
