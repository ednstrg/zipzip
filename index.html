<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 장소 검색 서비스</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }
        .sidebar {
            width: 350px;
            height: 100%;
            background-color: #f7f7f7;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }
        .search-box {
            padding: 15px;
            background-color: #fff;
            border-bottom: 1px solid #eee;
        }
        .search-box h2 {
            font-size: 18px;
            margin-bottom: 10px;
        }
        .search-form {
            display: flex;
            gap: 5px;
        }
        .search-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .search-btn {
            padding: 8px 15px;
            background-color: #fee500;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .search-btn:hover {
            background-color: #fada0a;
        }
        .places-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .place-item {
            padding: 10px;
            border-bottom: 1px solid #e1e1e1;
            background-color: #fff;
            margin-bottom: 8px;
            border-radius: 4px;
            cursor: pointer;
        }
        .place-item:hover {
            background-color: #f0f0f0;
        }
        .place-item h5 {
            font-size: 15px;
            color: #333;
            margin-bottom: 5px;
        }
        .place-item .address {
            font-size: 12px;
            color: #666;
        }
        .map-area {
            flex: 1;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <div class="search-box">
                <h2>어디로 갈까요?</h2>
                <form class="search-form" onsubmit="searchPlaces(); return false;">
                    <input type="text" id="keyword" class="search-input" placeholder="장소를 입력하세요" value="이태원 맛집">
                    <button type="submit" class="search-btn">검색</button>
                </form>
            </div>
            <div id="placesList" class="places-list"></div>
        </div>
        <div id="map" class="map-area"></div>
    </div>

    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=1532352a93d383138c1e5486388309cf&libraries=services"></script>

    <script>
        let map;
        let ps;
        let infowindow;
        let markers = [];

        // 지도가 로드된 후 안전하게 실행
        kakao.maps.load(function() {
            const mapContainer = document.getElementById('map'); 
            const mapOption = {
                center: new kakao.maps.LatLng(37.566826, 126.9786567), // 기본 위치 (서울시청)
                level: 5 // 지도 확대 레벨 5
            };

            map = new kakao.maps.Map(mapContainer, mapOption);
            ps = new kakao.maps.services.Places();  
            infowindow = new kakao.maps.InfoWindow({zIndex:1});

            // 현재 위치 권한 요청 후 중심 이동
            getUserLocation();
        });

        function getUserLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const locPosition = new kakao.maps.LatLng(lat, lon);
                    
                    map.setCenter(locPosition);
                    displayCurrentLocationMarker(locPosition);
                }, function(error) {
                    console.log("위치 권한 승인이 거부되었거나 가져올 수 없습니다.", error);
                });
            }
        }

        function displayCurrentLocationMarker(locPosition) {
            const marker = new kakao.maps.Marker({  
                map: map, 
                position: locPosition
            }); 
            const message = '<div style="padding:5px; font-size:12px; text-align:center;">내 현재 위치</div>';
            infowindow.setContent(message);
            infowindow.open(map, marker);
        }

        function searchPlaces() {
            const keyword = document.getElementById('keyword').value;
            if (!keyword.replace(/^\s+|\s+$/g, '')) {
                alert('검색어를 입력해주세요!');
                return false;
            }
            ps.keywordSearch(keyword, placesSearchCB); 
        }

        function placesSearchCB(data, status, pagination) {
            if (status === kakao.maps.services.Status.OK) {
                displayPlaces(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                alert('검색 결과가 없습니다.');
            } else if (status === kakao.maps.services.Status.ERROR) {
                alert('검색 중 오류가 발생했습니다.');
            }
        }

        function displayPlaces(places) {
            const listEl = document.getElementById('placesList');
            const bounds = new kakao.maps.LatLngBounds();
            
            removeMarkers();
            listEl.innerHTML = '';

            for (let i = 0; i < places.length; i++) {
                const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                const marker = addMarker(placePosition);
                const itemEl = getListItem(i, places[i]);

                bounds.extend(placePosition);

                (function(marker, title) {
                    kakao.maps.event.addListener(marker, 'mouseover', function() {
                        displayInfowindow(marker, title);
                    });
                    kakao.maps.event.addListener(marker, 'mouseout', function() {
                        infowindow.close();
                    });
                    itemEl.onmouseover =  function () {
                        displayInfowindow(marker, title);
                    };
                    itemEl.onmouseout =  function () {
                        infowindow.close();
                    };
                    itemEl.onclick = function() {
                        map.panTo(marker.getPosition());
                    };
                })(marker, places[i].place_name);

                listEl.appendChild(itemEl);
            }
            map.setBounds(bounds);
        }

        function getListItem(index, places) {
            const el = document.createElement('div');
            el.className = 'place-item';
            let itemStr = `<h5>${places.place_name}</h5>`;
            itemStr += `<span class="address">${places.road_address_name ? places.road_address_name : places.address_name}</span>`;
            el.innerHTML = itemStr;
            return el;
        }

        function addMarker(position) {
            const marker = new kakao.maps.Marker({ position: position, map: map });
            markers.push(marker);
            return marker;
        }

        function removeMarkers() {
            for (let i = 0; i < markers.length; i++) { markers[i].setMap(null); }            
            markers = [];
        }

        function displayInfowindow(marker, title) {
            const content = `<div style="padding:5px;z-index:1;font-size:12px;text-align:center;">${title}</div>`;
            infowindow.setContent(content);
            infowindow.open(map, marker);
        }
    </script>
</body>
</html>
